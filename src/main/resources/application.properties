# ==========================================
# AI Career Portal - Application Properties
# ==========================================

# Server
server.port=8080
spring.application.name=ai-career-portal

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:career_portal.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# File Upload (profile photos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=uploads/photos

# OpenRouter API
app.openrouter.api-url=https://openrouter.ai/api/v1/chat/completions
app.openrouter.model=google/gemini-2.0-flash-exp:free

# Logging
logging.level.com.careerportal=INFO
logging.level.org.hibernate=WARN
