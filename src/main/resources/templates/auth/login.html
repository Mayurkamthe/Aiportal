<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — CareerPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family:'Inter',sans-serif; margin:0; }
        .font-display { font-family:'Syne',sans-serif; }
        .form-input { width:100%; padding:11px 14px; border:1.5px solid #e5e7eb; border-radius:9px; font-size:14px; outline:none; transition: border .18s, box-shadow .18s; color:#0f1117; background:#fff; }
        .form-input:focus { border-color:#4f6ef7; box-shadow:0 0 0 3px rgba(79,110,247,.12); }
        .btn-primary { width:100%; padding:12px; background:#4f6ef7; color:#fff; border:none; border-radius:9px; font-size:15px; font-weight:600; cursor:pointer; transition: all .18s; font-family:'Inter',sans-serif; }
        .btn-primary:hover { background:#3b5ef0; transform:translateY(-1px); box-shadow:0 6px 16px rgba(79,110,247,.35); }
        .form-label { display:block; font-size:13px; font-weight:600; color:#0f1117; margin-bottom:6px; }
        .alert { padding:12px 16px; border-radius:9px; font-size:14px; font-weight:500; display:flex; align-items:center; gap:10px; }
        .alert-error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
        .alert-success { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #0f1117 0%, #1a1f35 50%, #0f1117 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">

    <!-- Background dots pattern -->
    <div style="position:fixed;inset:0;background-image:radial-gradient(circle, rgba(79,110,247,.08) 1px, transparent 1px);background-size:28px 28px;pointer-events:none;"></div>

    <div style="width:100%;max-width:440px;position:relative;z-index:1;">

        <!-- Logo -->
        <div style="text-align:center;margin-bottom:32px;">
            <div class="font-display" style="font-size:32px;font-weight:800;color:#fff;letter-spacing:-.5px;">
                Career<span style="color:#4f6ef7;">Path</span>
            </div>
            <p style="color:#6b7280;font-size:14px;margin-top:6px;">Your AI-powered career guidance platform</p>
        </div>

        <!-- Card -->
        <div style="background:#fff;border-radius:18px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,.4);">
            <h2 class="font-display" style="font-size:22px;font-weight:700;color:#0f1117;margin:0 0 6px;">Welcome back</h2>
            <p style="color:#6b7280;font-size:14px;margin:0 0 24px;">Sign in to continue to your portal</p>

            <!-- Alerts -->
            <div th:if="${error}" class="alert alert-error" style="margin-bottom:20px;">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom:20px;">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                You've been signed out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div style="margin-bottom:18px;">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required/>
                </div>
                <div style="margin-bottom:24px;">
                    <label class="form-label" for="password">Password</label>
                    <div style="position:relative;">
                        <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required style="padding-right:44px;"/>
                        <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7280;padding:0;">
                            <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <!-- Role hint -->
            <div style="margin-top:24px;padding:14px;background:#f5f6f8;border-radius:10px;">
                <p style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px;">Available Portals</p>
                <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    <span style="font-size:12px;padding:3px 10px;background:#dbeafe;color:#1e40af;border-radius:999px;font-weight:500;">Student</span>
                    <span style="font-size:12px;padding:3px 10px;background:#dcfce7;color:#15803d;border-radius:999px;font-weight:500;">Parent</span>
                    <span style="font-size:12px;padding:3px 10px;background:#fef3c7;color:#92400e;border-radius:999px;font-weight:500;">Counselor</span>
                    <span style="font-size:12px;padding:3px 10px;background:#fee2e2;color:#991b1b;border-radius:999px;font-weight:500;">Admin</span>
                </div>
            </div>
        </div>

        <p style="text-align:center;color:#4b5563;font-size:13px;margin-top:20px;">
            &copy; 2025 CareerPath. All rights reserved.
        </p>
    </div>

    <script>
        function togglePwd() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
