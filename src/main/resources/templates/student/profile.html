<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('My Profile')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: studentSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>

<main class="main-content">
    <div style="max-width:820px;">
        <div style="margin-bottom:28px;">
            <h1 class="section-title">My Profile</h1>
            <p class="section-sub">Keep your academic and personal details up to date.</p>
        </div>

        <div th:if="${success}" class="alert alert-success" style="margin-bottom:20px;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error" style="margin-bottom:20px;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/student/profile/save}" method="post" enctype="multipart/form-data">

            <!-- Profile Photo -->
            <div class="card" style="padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                <div style="position:relative;">
                    <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;background:#eef1fe;display:flex;align-items:center;justify-content:center;border:3px solid #4f6ef7;">
                        <img th:if="${student.profilePhoto}" th:src="@{'/uploads/' + ${student.profilePhoto}}" style="width:100%;height:100%;object-fit:cover;" alt="Photo"/>
                        <svg th:unless="${student.profilePhoto}" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#4f6ef7"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                </div>
                <div>
                    <p style="font-size:15px;font-weight:700;margin:0 0 4px;" th:text="${user.fullName}">Full Name</p>
                    <p style="font-size:13px;color:#6b7280;margin:0 0 12px;" th:text="${user.email}">email@example.com</p>
                    <label style="cursor:pointer;" class="btn btn-ghost btn-sm">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        Upload Photo
                        <input type="file" name="photo" accept="image/*" style="display:none;" onchange="previewPhoto(this)"/>
                    </label>
                </div>
            </div>

            <!-- Personal Info -->
            <div class="card" style="padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;">Personal Information</h3>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
                    <div>
                        <label class="form-label">Date of Birth</label>
                        <input class="form-input" type="date" name="dateOfBirth" th:value="${student.dateOfBirth}"/>
                    </div>
                    <div>
                        <label class="form-label">Gender</label>
                        <select class="form-input" name="gender">
                            <option value="">Select gender</option>
                            <option value="Male" th:selected="${student.gender == 'Male'}">Male</option>
                            <option value="Female" th:selected="${student.gender == 'Female'}">Female</option>
                            <option value="Other" th:selected="${student.gender == 'Other'}">Other</option>
                        </select>
                    </div>
                    <div style="grid-column:1/-1;">
                        <label class="form-label">Address</label>
                        <input class="form-input" type="text" name="address" th:value="${student.address}" placeholder="Street address"/>
                    </div>
                    <div>
                        <label class="form-label">City</label>
                        <input class="form-input" type="text" name="city" th:value="${student.city}" placeholder="City"/>
                    </div>
                    <div>
                        <label class="form-label">State</label>
                        <input class="form-input" type="text" name="state" th:value="${student.state}" placeholder="State"/>
                    </div>
                </div>
            </div>

            <!-- Academic Info -->
            <div class="card" style="padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;">Academic Details</h3>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
                    <div>
                        <label class="form-label">Current Class</label>
                        <select class="form-input" name="currentClass">
                            <option value="">Select class</option>
                            <option th:each="c : ${'9,10,11,12'.split(',')}" th:value="${c}" th:text="'Class ' + ${c}" th:selected="${student.currentClass == c}">Class</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Board</label>
                        <select class="form-input" name="board">
                            <option value="">Select board</option>
                            <option value="CBSE" th:selected="${student.board == 'CBSE'}">CBSE</option>
                            <option value="ICSE" th:selected="${student.board == 'ICSE'}">ICSE</option>
                            <option value="State Board" th:selected="${student.board == 'State Board'}">State Board</option>
                            <option value="IB" th:selected="${student.board == 'IB'}">IB</option>
                        </select>
                    </div>
                    <div style="grid-column:1/-1;">
                        <label class="form-label">School / Institution</label>
                        <input class="form-input" type="text" name="school" th:value="${student.school}" placeholder="School name"/>
                    </div>
                </div>
            </div>

            <!-- Marks -->
            <div class="card" style="padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;">Academic Performance (%)</h3>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;">
                    <div>
                        <label class="form-label">Mathematics</label>
                        <input class="form-input" type="number" name="mathMarks" th:value="${student.mathMarks}" min="0" max="100" placeholder="85"/>
                    </div>
                    <div>
                        <label class="form-label">Science</label>
                        <input class="form-input" type="number" name="scienceMarks" th:value="${student.scienceMarks}" min="0" max="100" placeholder="90"/>
                    </div>
                    <div>
                        <label class="form-label">English</label>
                        <input class="form-input" type="number" name="englishMarks" th:value="${student.englishMarks}" min="0" max="100" placeholder="78"/>
                    </div>
                    <div>
                        <label class="form-label">Overall %</label>
                        <input class="form-input" type="number" name="overallPercentage" th:value="${student.overallPercentage}" min="0" max="100" step="0.01" placeholder="84.5"/>
                    </div>
                </div>
            </div>

            <!-- Interests & Goals -->
            <div class="card" style="padding:24px;margin-bottom:24px;">
                <h3 style="font-size:15px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;">Interests, Skills & Goals</h3>
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Skills <span style="font-weight:400;color:#6b7280;">(comma separated)</span></label>
                        <input class="form-input" type="text" name="skills" th:value="${student.skills}" placeholder="e.g. Python, Drawing, Public Speaking"/>
                    </div>
                    <div>
                        <label class="form-label">Interests</label>
                        <input class="form-input" type="text" name="interests" th:value="${student.interests}" placeholder="e.g. Technology, Medicine, Arts"/>
                    </div>
                    <div>
                        <label class="form-label">Hobbies</label>
                        <input class="form-input" type="text" name="hobbies" th:value="${student.hobbies}" placeholder="e.g. Reading, Cricket, Music"/>
                    </div>
                    <div>
                        <label class="form-label">Career Goal</label>
                        <textarea class="form-input" name="careerGoal" rows="3" placeholder="Describe your dream career or goal..." th:text="${student.careerGoal}" style="resize:vertical;"></textarea>
                    </div>
                </div>
            </div>

            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save Profile
                </button>
                <a th:href="@{/student/dashboard}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<script>
    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.querySelector('.sidebar ~ main img');
                if (img) img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
