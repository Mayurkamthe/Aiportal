<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Job Openings')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: studentSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="margin-bottom:24px;">
        <h1 class="section-title">Job Openings</h1>
        <p class="section-sub">Entry-level and fresher-friendly opportunities.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
        <div th:each="job : ${jobs}" class="card" style="padding:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <div style="width:48px;height:48px;background:#f3f4f6;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#6b7280"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <div style="flex:1;min-width:200px;">
                <h3 style="font-size:15px;font-weight:700;margin:0 0 4px;" th:text="${job.title}">Job Title</h3>
                <p style="font-size:13px;color:#6b7280;margin:0;" th:text="${job.company} + ' · ' + ${job.location}">Company · Location</p>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
                <span class="badge badge-gray" th:text="${job.type}">Full-time</span>
                <span th:if="${job.salaryRange}" style="font-size:13px;font-weight:600;color:#15803d;" th:text="${job.salaryRange}">Salary</span>
            </div>
        </div>
    </div>
    <div th:if="${jobs == null or jobs.isEmpty()}" class="card" style="padding:48px;text-align:center;">
        <p style="font-size:15px;font-weight:600;color:#374151;margin:0;">No jobs listed yet.</p>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
