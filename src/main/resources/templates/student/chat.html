<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('AI Career Chat')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: studentSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>

<main class="main-content" style="display:flex;flex-direction:column;height:100vh;padding-bottom:0;">
    <div style="margin-bottom:16px;">
        <h1 class="section-title">AI Career Advisor</h1>
        <p class="section-sub">Ask anything about your career, courses, or skills.</p>
    </div>

    <!-- Chat window -->
    <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;margin-bottom:0;min-height:0;">
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;">

            <!-- AI greeting -->
            <div style="display:flex;gap:12px;align-items:flex-start;">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4f6ef7,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </div>
                <div style="max-width:70%;">
                    <p style="font-size:12px;font-weight:600;color:#6b7280;margin:0 0 4px;">AI Advisor</p>
                    <div style="background:#f5f6f8;border-radius:0 12px 12px 12px;padding:14px 16px;font-size:14px;line-height:1.6;color:#374151;">
                        Hi! I'm your AI career advisor. I can help you explore career options, understand your assessment results, find relevant courses, and plan your path forward. What would you like to know?
                    </div>
                </div>
            </div>

            <!-- Past chat history -->
            <div th:each="chat : ${chats}">
                <!-- User message -->
                <div style="display:flex;gap:12px;align-items:flex-start;flex-direction:row-reverse;">
                    <div style="width:36px;height:36px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6b7280"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <div style="max-width:70%;">
                        <p style="font-size:12px;font-weight:600;color:#6b7280;margin:0 0 4px;text-align:right;">You</p>
                        <div style="background:#4f6ef7;border-radius:12px 0 12px 12px;padding:14px 16px;font-size:14px;line-height:1.6;color:#fff;" th:text="${chat.userMessage}"></div>
                    </div>
                </div>
                <!-- AI reply -->
                <div style="display:flex;gap:12px;align-items:flex-start;">
                    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4f6ef7,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    </div>
                    <div style="max-width:70%;">
                        <p style="font-size:12px;font-weight:600;color:#6b7280;margin:0 0 4px;">AI Advisor</p>
                        <div style="background:#f5f6f8;border-radius:0 12px 12px 12px;padding:14px 16px;font-size:14px;line-height:1.6;color:#374151;" th:text="${chat.aiResponse}"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Typing indicator -->
        <div id="typingIndicator" style="display:none;padding:0 20px 8px;">
            <div style="display:flex;gap:4px;align-items:center;padding:10px 14px;background:#f5f6f8;border-radius:12px;width:fit-content;">
                <div style="width:8px;height:8px;border-radius:50%;background:#9ca3af;animation:bounce .8s infinite;"></div>
                <div style="width:8px;height:8px;border-radius:50%;background:#9ca3af;animation:bounce .8s .15s infinite;"></div>
                <div style="width:8px;height:8px;border-radius:50%;background:#9ca3af;animation:bounce .8s .3s infinite;"></div>
            </div>
        </div>

        <!-- Input area -->
        <div style="padding:16px 20px;border-top:1px solid #e5e7eb;display:flex;gap:10px;align-items:flex-end;">
            <textarea id="chatInput" placeholder="Ask about careers, courses, skills..."
                style="flex:1;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;resize:none;outline:none;max-height:120px;transition:border .18s;line-height:1.5;"
                rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" onfocus="this.style.borderColor='#4f6ef7'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
            <button onclick="sendMessage()" id="sendBtn"
                style="width:44px;height:44px;background:#4f6ef7;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
        </div>
    </div>

</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<style>
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
</style>
<script>
    const chatMessages = document.getElementById('chatMessages');
    chatMessages.scrollTop = chatMessages.scrollHeight;

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        appendMessage(msg, 'user');
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('typingIndicator').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const res = await fetch('/student/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'message=' + encodeURIComponent(msg)
            });
            const data = await res.json();
            document.getElementById('typingIndicator').style.display = 'none';
            appendMessage(data.response || data.error, 'ai');
        } catch (e) {
            document.getElementById('typingIndicator').style.display = 'none';
            appendMessage('Something went wrong. Please try again.', 'ai');
        }
        document.getElementById('sendBtn').disabled = false;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function appendMessage(text, role) {
        const isUser = role === 'user';
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;gap:12px;align-items:flex-start;' + (isUser ? 'flex-direction:row-reverse;' : '');
        div.innerHTML = `
            <div style="width:36px;height:36px;border-radius:50%;background:${isUser ? '#e5e7eb' : 'linear-gradient(135deg,#4f6ef7,#7c3aed)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="${isUser ? '#6b7280' : '#fff'}"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${isUser ? 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' : 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z'}"/></svg>
            </div>
            <div style="max-width:70%;">
                <p style="font-size:12px;font-weight:600;color:#6b7280;margin:0 0 4px;${isUser ? 'text-align:right;' : ''}">${isUser ? 'You' : 'AI Advisor'}</p>
                <div style="background:${isUser ? '#4f6ef7' : '#f5f6f8'};border-radius:${isUser ? '12px 0 12px 12px' : '0 12px 12px 12px'};padding:14px 16px;font-size:14px;line-height:1.6;color:${isUser ? '#fff' : '#374151'};">${text}</div>
            </div>`;
        chatMessages.insertBefore(div, document.getElementById('typingIndicator'));
    }
</script>
</body>
</html>
