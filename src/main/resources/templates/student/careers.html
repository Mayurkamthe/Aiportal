<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Explore Careers')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: studentSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Explore Careers</h1>
            <p class="section-sub">Browse career options matched to your interests.</p>
        </div>
        <input type="text" id="searchInput" placeholder="Search careers..." onkeyup="filterCards()" class="form-input" style="width:auto;min-width:200px;"/>
    </div>

    <div id="careerGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
        <div th:each="career : ${careers}" class="card career-card" th:attr="data-name=${career.name},data-category=${career.category}" style="padding:22px;transition:box-shadow .18s;cursor:default;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
                <div style="width:44px;height:44px;background:#eef1fe;border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#4f6ef7"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <span class="badge badge-blue" th:text="${career.category}">Category</span>
            </div>
            <h3 style="font-size:15px;font-weight:700;margin:0 0 8px;" th:text="${career.name}">Career Name</h3>
            <p style="font-size:13px;color:#6b7280;margin:0 0 14px;line-height:1.5;" th:text="${career.description}">Description of this career path and what it entails.</p>
            <div style="display:flex;flex-direction:column;gap:6px;">
                <div th:if="${career.salaryRange}" style="display:flex;align-items:center;gap:8px;font-size:12px;color:#374151;">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6b7280"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span th:text="${career.salaryRange}">Salary range</span>
                </div>
                <div th:if="${career.educationRequired}" style="display:flex;align-items:center;gap:8px;font-size:12px;color:#374151;">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6b7280"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                    <span th:text="${career.educationRequired}">Education</span>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${careers == null or careers.isEmpty()}" class="card" style="padding:48px;text-align:center;">
        <p style="font-size:15px;font-weight:600;color:#374151;margin:0 0 4px;">No careers listed yet.</p>
        <p style="font-size:13px;color:#9ca3af;">Check back later or ask your counselor.</p>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<script>
    function filterCards() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.career-card').forEach(c => {
            const match = c.dataset.name.toLowerCase().includes(q) || c.dataset.category.toLowerCase().includes(q);
            c.style.display = match ? '' : 'none';
        });
    }
</script>
</body>
</html>
