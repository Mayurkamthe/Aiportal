<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('My Students')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: counselorSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="margin-bottom:24px;">
        <h1 class="section-title">My Students</h1>
        <p class="section-sub">All students assigned to you for career guidance.</p>
    </div>
    <div class="card" style="overflow:hidden;padding:0;">
        <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;">
            <input type="text" id="searchInput" placeholder="Search by name or school..." class="form-input" style="max-width:320px;" onkeyup="filterTable()"/>
        </div>
        <div style="overflow-x:auto;">
            <table id="studentTable">
                <thead><tr>
                    <th>Student</th><th>Class</th><th>Board</th><th>School</th><th>Overall %</th><th>Actions</th>
                </tr></thead>
                <tbody>
                <tr th:each="s : ${students}">
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:36px;height:36px;border-radius:50%;background:#eef1fe;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#4f6ef7;" th:text="${s.user.fullName.charAt(0)}">A</div>
                            <div>
                                <p style="font-size:14px;font-weight:600;margin:0;" th:text="${s.user.fullName}">Name</p>
                                <p style="font-size:12px;color:#6b7280;margin:0;" th:text="${s.user.email}">email</p>
                            </div>
                        </div>
                    </td>
                    <td th:text="${s.currentClass != null ? 'Class ' + s.currentClass : '—'}">—</td>
                    <td th:text="${s.board != null ? s.board : '—'}">—</td>
                    <td th:text="${s.school != null ? s.school : '—'}">—</td>
                    <td>
                        <span th:if="${s.overallPercentage != null}" style="font-size:14px;font-weight:700;" th:text="${s.overallPercentage + '%'}">—</span>
                        <span th:unless="${s.overallPercentage != null}" style="color:#9ca3af;">—</span>
                    </td>
                    <td style="display:flex;gap:8px;flex-wrap:wrap;">
                        <a th:href="@{/counselor/student/{id}(id=${s.id})}" class="btn btn-ghost btn-sm">View</a>
                        <a th:href="@{/counselor/student/{id}/report(id=${s.id})}" class="btn btn-primary btn-sm">PDF</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${students == null or students.isEmpty()}" style="padding:48px;text-align:center;">
            <p style="font-size:14px;color:#9ca3af;">No students assigned yet.</p>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#studentTable tbody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
</body>
</html>
