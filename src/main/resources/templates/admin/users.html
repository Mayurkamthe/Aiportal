<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Manage Users')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Manage Users</h1>
            <p class="section-sub">Create, edit and manage all portal users.</p>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add User
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}"></span>
    </div>

    <div class="card" style="overflow:hidden;padding:0;">
        <div style="padding:14px 20px;border-bottom:1px solid #e5e7eb;">
            <input type="text" id="searchInput" placeholder="Search users..." onkeyup="filterTable()" class="form-input" style="max-width:300px;"/>
        </div>
        <div style="overflow-x:auto;">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div style="display:flex;align-items:center;gap:10px;">
                                <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"
                                     th:style="'background:' + (${u.role == 'STUDENT'} ? '#eef1fe;color:#4f6ef7' : (${u.role == 'PARENT'} ? '#dcfce7;color:#15803d' : (${u.role == 'COUNSELOR'} ? '#fef3c7;color:#92400e' : '#fee2e2;color:#991b1b')))"
                                     th:text="${u.fullName != null ? u.fullName.charAt(0) : '?'}">A</div>
                                <div>
                                    <p style="font-size:14px;font-weight:600;margin:0;" th:text="${u.fullName}">Full Name</p>
                                    <p style="font-size:12px;color:#6b7280;margin:0;" th:text="${u.email}">email</p>
                                </div>
                            </div>
                        </td>
                        <td style="font-family:monospace;font-size:13px;" th:text="${u.username}">username</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.role == 'STUDENT'} ? 'badge-blue' : (${u.role == 'PARENT'} ? 'badge-green' : (${u.role == 'COUNSELOR'} ? 'badge-amber' : 'badge-red'))"
                                  th:text="${u.role}">Role</span>
                        </td>
                        <td th:text="${u.phone != null ? u.phone : '—'}">—</td>
                        <td>
                            <span class="badge" th:classappend="${u.active} ? 'badge-green' : 'badge-gray'" th:text="${u.active} ? 'Active' : 'Inactive'">Active</span>
                        </td>
                        <td>
                            <div style="display:flex;gap:8px;">
                                <a th:href="@{/admin/users/new(id=${u.id})}" class="btn btn-ghost btn-sm">Edit</a>
                                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                                   onclick="return confirm('Delete this user?')"
                                   class="btn btn-danger btn-sm">Delete</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${users == null or users.isEmpty()}" style="padding:48px;text-align:center;">
            <p style="font-size:14px;color:#9ca3af;">No users found. <a th:href="@{/admin/users/new}" style="color:#4f6ef7;">Add one →</a></p>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#usersTable tbody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
</body>
</html>
