<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Courses')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Courses</h1>
            <p class="section-sub">Manage courses shown to students.</p>
        </div>
        <button onclick="document.getElementById('courseModal').style.display='flex'" class="btn btn-primary">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Course
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}"></span>
    </div>

    <div class="card" style="overflow:hidden;padding:0;">
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Title</th><th>Provider</th><th>Category</th><th>Level</th><th>Duration</th><th>Price</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="c : ${courses}">
                        <td>
                            <p style="font-size:14px;font-weight:600;margin:0;" th:text="${c.title}">Title</p>
                            <a th:if="${c.url}" th:href="${c.url}" target="_blank" style="font-size:12px;color:#4f6ef7;">View →</a>
                        </td>
                        <td th:text="${c.provider}">Provider</td>
                        <td><span class="badge badge-blue" th:text="${c.category}">Cat</span></td>
                        <td><span class="badge" th:classappend="${c.level == 'Beginner'} ? 'badge-green' : (${c.level == 'Advanced'} ? 'badge-red' : 'badge-amber')" th:text="${c.level}">Level</span></td>
                        <td style="font-size:13px;" th:text="${c.duration}">Duration</td>
                        <td style="font-size:13px;font-weight:600;color:#15803d;" th:text="${c.price}">Free</td>
                        <td><span class="badge" th:classappend="${c.active} ? 'badge-green' : 'badge-gray'" th:text="${c.active} ? 'Active' : 'Hidden'">Status</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${courses == null or courses.isEmpty()}" style="padding:48px;text-align:center;">
            <p style="font-size:14px;color:#9ca3af;">No courses added yet.</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="courseModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <h2 style="font-size:17px;font-weight:700;margin:0;">Add Course</h2>
                <button onclick="document.getElementById('courseModal').style.display='none'" style="background:none;border:none;cursor:pointer;color:#6b7280;">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form th:action="@{/admin/courses/save}" method="post">
                <div style="display:grid;gap:14px;">
                    <div>
                        <label class="form-label">Title *</label>
                        <input class="form-input" type="text" name="title" placeholder="Course title" required/>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Provider</label>
                            <input class="form-input" type="text" name="provider" placeholder="Coursera, Udemy..."/>
                        </div>
                        <div>
                            <label class="form-label">Category</label>
                            <input class="form-input" type="text" name="category" placeholder="Technology"/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Description</label>
                        <textarea class="form-input" name="description" rows="2" style="resize:vertical;"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Duration</label>
                            <input class="form-input" type="text" name="duration" placeholder="6 weeks"/>
                        </div>
                        <div>
                            <label class="form-label">Price</label>
                            <input class="form-input" type="text" name="price" placeholder="Free / ₹999"/>
                        </div>
                        <div>
                            <label class="form-label">Level</label>
                            <select class="form-input" name="level">
                                <option value="Beginner">Beginner</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Advanced">Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">URL</label>
                        <input class="form-input" type="url" name="url" placeholder="https://..."/>
                    </div>
                </div>
                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary">Save Course</button>
                    <button type="button" onclick="document.getElementById('courseModal').style.display='none'" class="btn btn-ghost">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
