<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Settings')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="max-width:680px;">
        <div style="margin-bottom:24px;">
            <h1 class="section-title">System Settings</h1>
            <p class="section-sub">Configure platform-wide settings.</p>
        </div>

        <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <span th:text="${success}"></span>
        </div>

        <div class="card" style="padding:28px;">
            <form th:action="@{/admin/settings/save}" method="post">
                <div th:if="${settings != null and !settings.isEmpty()}" style="display:grid;gap:18px;">
                    <div th:each="s : ${settings}">
                        <label class="form-label" th:text="${s.settingKey.replace('_',' ').replace('.',': ')}">Setting</label>
                        <input class="form-input" type="text" th:name="'setting_' + ${s.settingKey}" th:value="${s.settingValue}" th:placeholder="${s.settingKey}"/>
                        <p th:if="${s.description}" style="font-size:12px;color:#9ca3af;margin:4px 0 0;" th:text="${s.description}"></p>
                    </div>
                </div>

                <!-- Default settings if none exist -->
                <div th:if="${settings == null or settings.isEmpty()}" style="display:grid;gap:18px;">
                    <div style="padding:16px;background:#f5f6f8;border-radius:10px;text-align:center;">
                        <p style="font-size:14px;color:#6b7280;margin:0;">No settings configured yet. Add settings via the database or migration scripts.</p>
                    </div>
                </div>

                <div th:unless="${settings == null or settings.isEmpty()}" style="margin-top:24px;">
                    <button type="submit" class="btn btn-primary">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        Save Settings
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
