<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('User Form')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="max-width:600px;">
        <a th:href="@{/admin/users}" style="font-size:13px;color:#6b7280;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to Users
        </a>
        <div style="margin-bottom:24px;">
            <h1 class="section-title" th:text="${user.id != null} ? 'Edit User' : 'Add New User'">Add User</h1>
            <p class="section-sub">Fill in the details below to create or update a user account.</p>
        </div>

        <div class="card" style="padding:28px;">
            <form th:action="@{/admin/users/save}" method="post">
                <input type="hidden" name="id" th:value="${user.id}"/>

                <div style="display:grid;gap:18px;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div>
                            <label class="form-label">Full Name *</label>
                            <input class="form-input" type="text" name="fullName" th:value="${user.fullName}" placeholder="John Doe" required/>
                        </div>
                        <div>
                            <label class="form-label">Username *</label>
                            <input class="form-input" type="text" name="username" th:value="${user.username}" placeholder="johndoe" required/>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div>
                            <label class="form-label">Password <span th:if="${user.id != null}" style="font-weight:400;color:#6b7280;">(leave blank to keep)</span><span th:unless="${user.id != null}">*</span></label>
                            <input class="form-input" type="password" name="password" placeholder="••••••••" th:required="${user.id == null}"/>
                        </div>
                        <div>
                            <label class="form-label">Role *</label>
                            <select class="form-input" name="role" required>
                                <option value="">Select role</option>
                                <option value="STUDENT" th:selected="${user.role == 'STUDENT'}">Student</option>
                                <option value="PARENT" th:selected="${user.role == 'PARENT'}">Parent</option>
                                <option value="COUNSELOR" th:selected="${user.role == 'COUNSELOR'}">Counselor</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="form-label">Email</label>
                        <input class="form-input" type="email" name="email" th:value="${user.email}" placeholder="john@example.com"/>
                    </div>

                    <div>
                        <label class="form-label">Phone</label>
                        <input class="form-input" type="tel" name="phone" th:value="${user.phone}" placeholder="+91 9876543210"/>
                    </div>
                </div>

                <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;">
                    <button type="submit" class="btn btn-primary">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        <span th:text="${user.id != null} ? 'Update User' : 'Create User'">Save</span>
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
