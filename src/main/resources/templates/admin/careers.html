<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Careers')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Careers</h1>
            <p class="section-sub">Manage career paths shown to students.</p>
        </div>
        <button onclick="openModal()" class="btn btn-primary">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Career
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}"></span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">
        <div th:each="c : ${careers}" class="card" style="padding:20px;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
                <span class="badge badge-blue" th:text="${c.category}">Category</span>
                <span class="badge" th:classappend="${c.active} ? 'badge-green' : 'badge-gray'" th:text="${c.active} ? 'Active' : 'Hidden'">Status</span>
            </div>
            <h3 style="font-size:15px;font-weight:700;margin:0 0 6px;" th:text="${c.name}">Career Name</h3>
            <p style="font-size:13px;color:#6b7280;margin:0 0 12px;line-height:1.5;" th:text="${c.description}">Description</p>
            <div style="font-size:12px;color:#374151;margin-bottom:14px;display:flex;flex-direction:column;gap:4px;">
                <span th:if="${c.salaryRange}" th:text="'💰 ' + ${c.salaryRange}"></span>
                <span th:if="${c.educationRequired}" th:text="'🎓 ' + ${c.educationRequired}"></span>
            </div>
            <div style="display:flex;gap:8px;">
                <a th:href="@{/admin/careers/delete/{id}(id=${c.id})}" onclick="return confirm('Delete this career?')" class="btn btn-danger btn-sm">Delete</a>
            </div>
        </div>
    </div>
    <div th:if="${careers == null or careers.isEmpty()}" class="card" style="padding:48px;text-align:center;">
        <p style="font-size:14px;color:#9ca3af;">No careers added yet.</p>
    </div>

    <!-- Add Career Modal -->
    <div id="careerModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <h2 style="font-size:17px;font-weight:700;margin:0;">Add Career</h2>
                <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#6b7280;padding:4px;">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form th:action="@{/admin/careers/save}" method="post">
                <div style="display:grid;gap:14px;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Career Name *</label>
                            <input class="form-input" type="text" name="name" placeholder="e.g. Software Engineer" required/>
                        </div>
                        <div>
                            <label class="form-label">Category *</label>
                            <input class="form-input" type="text" name="category" placeholder="e.g. Technology"/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Description</label>
                        <textarea class="form-input" name="description" rows="3" placeholder="Brief description..." style="resize:vertical;"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Salary Range</label>
                            <input class="form-input" type="text" name="salaryRange" placeholder="₹5L – ₹20L/yr"/>
                        </div>
                        <div>
                            <label class="form-label">Education Required</label>
                            <input class="form-input" type="text" name="educationRequired" placeholder="B.Tech / BCA"/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Required Skills</label>
                        <input class="form-input" type="text" name="requiredSkills" placeholder="Python, Problem Solving, Communication"/>
                    </div>
                </div>
                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary">Save Career</button>
                    <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
<script>
function openModal() { document.getElementById('careerModal').style.display = 'flex'; }
function closeModal() { document.getElementById('careerModal').style.display = 'none'; }
document.getElementById('careerModal').addEventListener('click', e => { if(e.target === document.getElementById('careerModal')) closeModal(); });
</script>
</body>
</html>
