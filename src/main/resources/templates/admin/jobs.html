<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Jobs')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Job Listings</h1>
            <p class="section-sub">Manage job opportunities shown to students.</p>
        </div>
        <button onclick="document.getElementById('jobModal').style.display='flex'" class="btn btn-primary">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Job
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}"></span>
    </div>

    <div class="card" style="overflow:hidden;padding:0;">
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Job</th><th>Company</th><th>Location</th><th>Type</th><th>Salary</th><th>Experience</th></tr></thead>
                <tbody>
                    <tr th:each="j : ${jobs}">
                        <td>
                            <p style="font-size:14px;font-weight:600;margin:0;" th:text="${j.title}">Title</p>
                            <p style="font-size:12px;color:#9ca3af;margin:0;" th:text="${j.requiredSkills}">Skills</p>
                        </td>
                        <td th:text="${j.company}">Company</td>
                        <td th:text="${j.location}">Location</td>
                        <td><span class="badge badge-gray" th:text="${j.type}">Type</span></td>
                        <td style="font-size:13px;font-weight:600;color:#15803d;" th:text="${j.salaryRange}">Salary</td>
                        <td style="font-size:13px;" th:text="${j.experience}">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${jobs == null or jobs.isEmpty()}" style="padding:48px;text-align:center;">
            <p style="font-size:14px;color:#9ca3af;">No jobs added yet.</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="jobModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <h2 style="font-size:17px;font-weight:700;margin:0;">Add Job</h2>
                <button onclick="document.getElementById('jobModal').style.display='none'" style="background:none;border:none;cursor:pointer;color:#6b7280;">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form th:action="@{/admin/jobs/save}" method="post">
                <div style="display:grid;gap:14px;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Job Title *</label>
                            <input class="form-input" type="text" name="title" placeholder="Software Developer" required/>
                        </div>
                        <div>
                            <label class="form-label">Company *</label>
                            <input class="form-input" type="text" name="company" placeholder="Company name" required/>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Location</label>
                            <input class="form-input" type="text" name="location" placeholder="Mumbai / Remote"/>
                        </div>
                        <div>
                            <label class="form-label">Type</label>
                            <select class="form-input" name="type">
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                                <option value="Remote">Remote</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Description</label>
                        <textarea class="form-input" name="description" rows="2" style="resize:vertical;"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Salary Range</label>
                            <input class="form-input" type="text" name="salaryRange" placeholder="₹4L – ₹8L/yr"/>
                        </div>
                        <div>
                            <label class="form-label">Experience</label>
                            <input class="form-input" type="text" name="experience" placeholder="Fresher / 1-2 yrs"/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Required Skills</label>
                        <input class="form-input" type="text" name="requiredSkills" placeholder="Java, Spring Boot, SQL"/>
                    </div>
                </div>
                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary">Save Job</button>
                    <button type="button" onclick="document.getElementById('jobModal').style.display='none'" class="btn btn-ghost">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
