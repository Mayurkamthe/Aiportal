<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Internships')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="section-title">Internships</h1>
            <p class="section-sub">Manage internship listings shown to students.</p>
        </div>
        <button onclick="document.getElementById('internModal').style.display='flex'" class="btn btn-primary">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Internship
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}"></span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
        <div th:each="intern : ${internships}" class="card" style="padding:20px;">
            <div style="width:40px;height:40px;background:#f0fdf4;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#16a34a"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h3 style="font-size:15px;font-weight:700;margin:0 0 4px;" th:text="${intern.title}">Title</h3>
            <p style="font-size:13px;color:#6b7280;margin:0 0 8px;" th:text="${intern.company}">Company</p>
            <p style="font-size:13px;color:#374151;line-height:1.5;margin:0;" th:text="${intern.description}">Description</p>
        </div>
    </div>
    <div th:if="${internships == null or internships.isEmpty()}" class="card" style="padding:48px;text-align:center;">
        <p style="font-size:14px;color:#9ca3af;">No internships added yet.</p>
    </div>

    <!-- Modal -->
    <div id="internModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px;">
        <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <h2 style="font-size:17px;font-weight:700;margin:0;">Add Internship</h2>
                <button onclick="document.getElementById('internModal').style.display='none'" style="background:none;border:none;cursor:pointer;color:#6b7280;">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form th:action="@{/admin/internships/save}" method="post">
                <div style="display:grid;gap:14px;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Title *</label>
                            <input class="form-input" type="text" name="title" placeholder="Frontend Intern" required/>
                        </div>
                        <div>
                            <label class="form-label">Company *</label>
                            <input class="form-input" type="text" name="company" placeholder="Company name" required/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Description</label>
                        <textarea class="form-input" name="description" rows="3" style="resize:vertical;"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <label class="form-label">Duration</label>
                            <input class="form-input" type="text" name="duration" placeholder="3 months"/>
                        </div>
                        <div>
                            <label class="form-label">Stipend</label>
                            <input class="form-input" type="text" name="stipend" placeholder="₹5,000/month"/>
                        </div>
                    </div>
                </div>
                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" onclick="document.getElementById('internModal').style.display='none'" class="btn btn-ghost">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
