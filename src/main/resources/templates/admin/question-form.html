<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Question Form')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: adminSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="max-width:640px;">
        <a th:href="@{/admin/questions}" style="font-size:13px;color:#6b7280;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to Questions
        </a>
        <div style="margin-bottom:24px;">
            <h1 class="section-title" th:text="${question.id != null} ? 'Edit Question' : 'New Question'">Question</h1>
        </div>

        <div class="card" style="padding:28px;">
            <form th:action="@{/admin/questions/save}" method="post">
                <input type="hidden" name="id" th:value="${question.id}"/>
                <div style="display:grid;gap:18px;">
                    <div>
                        <label class="form-label">Assessment Type *</label>
                        <select class="form-input" name="questionType" required>
                            <option value="">Select type</option>
                            <option value="APTITUDE" th:selected="${question.questionType == 'APTITUDE'}">Aptitude</option>
                            <option value="INTEREST" th:selected="${question.questionType == 'INTEREST'}">Interest</option>
                            <option value="PERSONALITY" th:selected="${question.questionType == 'PERSONALITY'}">Personality</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Question Text *</label>
                        <textarea class="form-input" name="questionText" rows="3" placeholder="Enter the question..." required style="resize:vertical;" th:text="${question.questionText}"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                        <div>
                            <label class="form-label">Option A</label>
                            <input class="form-input" type="text" name="optionA" th:value="${question.optionA}" placeholder="Option A"/>
                        </div>
                        <div>
                            <label class="form-label">Option B</label>
                            <input class="form-input" type="text" name="optionB" th:value="${question.optionB}" placeholder="Option B"/>
                        </div>
                        <div>
                            <label class="form-label">Option C</label>
                            <input class="form-input" type="text" name="optionC" th:value="${question.optionC}" placeholder="Option C"/>
                        </div>
                        <div>
                            <label class="form-label">Option D</label>
                            <input class="form-input" type="text" name="optionD" th:value="${question.optionD}" placeholder="Option D"/>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Correct Answer</label>
                        <select class="form-input" name="correctAnswer" style="max-width:160px;">
                            <option value="">Select</option>
                            <option value="A" th:selected="${question.correctAnswer == 'A'}">A</option>
                            <option value="B" th:selected="${question.correctAnswer == 'B'}">B</option>
                            <option value="C" th:selected="${question.correctAnswer == 'C'}">C</option>
                            <option value="D" th:selected="${question.correctAnswer == 'D'}">D</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;">
                    <button type="submit" class="btn btn-primary">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        Save Question
                    </button>
                    <a th:href="@{/admin/questions}" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
