<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Student Progress')}"></head>
<body>
<div class="overlay" onclick="toggleSidebar()"></div>
<div th:replace="~{fragments/sidebar :: parentSidebar}"></div>
<div class="mobile-topbar">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:#fff;padding:4px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-display" style="color:#fff;font-size:17px;font-weight:700;">Career<span style="color:#4f6ef7;">Path</span></span>
</div>
<main class="main-content">
    <div style="max-width:820px;">
        <a th:href="@{/parent/dashboard}" style="font-size:13px;color:#6b7280;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Dashboard
        </a>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
            <div>
                <h1 class="section-title" th:text="${student.user.fullName} + '''s Progress'">Progress</h1>
                <p class="section-sub" th:text="${student.school != null ? student.school : 'Student'} + ' · Class ' + ${student.currentClass}">School · Class</p>
            </div>
            <a th:href="@{/parent/student/{id}/report(id=${student.id})}" class="btn btn-primary">Download PDF</a>
        </div>

        <!-- Assessments -->
        <div class="card" style="padding:22px;margin-bottom:20px;">
            <h3 style="font-size:14px;font-weight:700;margin:0 0 16px;">Assessment Status</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">
                <div th:each="assessment : ${assessments}" style="padding:14px;border:1.5px solid #e5e7eb;border-radius:10px;text-align:center;">
                    <div style="width:32px;height:32px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#16a34a"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </div>
                    <p style="font-size:13px;font-weight:700;margin:0 0 2px;" th:text="${assessment.assessmentType}">Type</p>
                    <span class="badge badge-green">Completed</span>
                </div>
            </div>
            <div th:if="${assessments == null or assessments.isEmpty()}" style="text-align:center;padding:16px 0;">
                <p style="font-size:13px;color:#9ca3af;">No assessments completed yet.</p>
            </div>
        </div>

        <!-- AI Report -->
        <div th:if="${report}" class="card" style="padding:22px;margin-bottom:20px;">
            <h3 style="font-size:14px;font-weight:700;margin:0 0 12px;">AI Career Recommendation</h3>
            <div style="background:#eef1fe;border-radius:10px;padding:16px;margin-bottom:14px;">
                <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin:0 0 4px;">Top Career Match</p>
                <p style="font-size:18px;font-weight:800;color:#1e40af;margin:0;" th:text="${report.topCareerMatch}">Career</p>
            </div>
            <p style="font-size:13px;color:#374151;line-height:1.6;margin:0;" th:text="${report.recommendedCareers}">Recommendations</p>
        </div>

        <!-- Notes -->
        <div class="card" style="padding:22px;">
            <h3 style="font-size:14px;font-weight:700;margin:0 0 16px;">Counselor Feedback</h3>
            <div th:each="note : ${notes}" style="padding:14px;background:#f5f6f8;border-radius:10px;margin-bottom:10px;">
                <p style="font-size:14px;color:#374151;margin:0 0 6px;line-height:1.5;" th:text="${note.noteText}">Note</p>
                <p style="font-size:12px;color:#9ca3af;margin:0;" th:text="${#temporals.format(note.createdAt, 'dd MMM yyyy, HH:mm')}">Date</p>
            </div>
            <div th:if="${notes == null or notes.isEmpty()}" style="text-align:center;padding:16px 0;">
                <p style="font-size:13px;color:#9ca3af;">No counselor notes yet.</p>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sidebar :: mobileScript}"></div>
</body>
</html>
